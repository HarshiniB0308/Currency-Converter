<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Currency Converter</title>
    <meta name="description" content="Convert currencies in real time with our fast, modern, and easy-to-use tool.">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons for standard icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style3.css">
</head>

<body>
    <main class="container">
        <!-- Main Converter Card -->
        <div class="converter-card shadow">

            <header class="card-header">
                <i class='bx bx-transfer-alt icon-main'></i>
                <h1>Currency Converter</h1>
                <p>Live exchange rates, instantly.</p>
            </header>

            <div class="app-body">
                <!-- Amount Input -->
                <div class="input-group">
                    <label for="amount">Amount</label>
                    <div class="input-wrapper">
                        <span class="currency-symbol" id="input-symbol">$</span>
                        <input type="number" id="amount" value="1.00" min="0" step="any" placeholder="Enter amount">
                    </div>
                </div>

                <!-- Currency Selectors & Swap -->
                <div class="currency-selectors">
                    <div class="input-group select-group">
                        <label for="from-currency">From</label>
                        <div class="select-wrapper">
                            <span class="flag-icon" id="from-flag">🇺🇸</span>
                            <select id="from-currency"></select>
                            <i class='bx bx-chevron-down select-arrow'></i>
                        </div>
                    </div>

                    <button class="swap-btn" id="swap-btn" aria-label="Swap currencies" title="Swap currencies">
                        <i class='bx bx-transfer'></i>
                    </button>

                    <div class="input-group select-group">
                        <label for="to-currency">To</label>
                        <div class="select-wrapper">
                            <span class="flag-icon" id="to-flag">🇪🇺</span>
                            <select id="to-currency"></select>
                            <i class='bx bx-chevron-down select-arrow'></i>
                        </div>
                    </div>
                </div>

                <!-- Convert Action (if not auto-converting, but we will auto-convert) -->
                <!-- A primary action button can still be helpful for UX if the user wants an explicit action -->
                <button id="convert-btn" class="btn-primary">Convert</button>

                <!-- Loading State -->
                <div id="loading" class="state-indicator hidden">
                    <div class="spinner"></div>
                    <span>Fetching live rates...</span>
                </div>

                <!-- Error State -->
                <div id="error" class="state-indicator error hidden">
                    <i class='bx bx-error-circle'></i>
                    <span id="error-message">Failed to load exchange rates.</span>
                </div>

                <!-- Results Display -->
                <div id="result" class="result-container hidden">
                    <div class="converted-amount">
                        <span id="result-value">--</span>
                        <span id="result-currency">--</span>
                    </div>
                    <div class="exchange-rate-info">
                        <p id="rate-text">1 USD = -- EUR</p>
                        <p id="update-time" class="timestamp">Last updated: --</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
